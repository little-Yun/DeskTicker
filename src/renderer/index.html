<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐盘</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="app" class="app">
      <header class="titlebar">
        <div class="brand">
          <span class="dot"></span>
          <strong>隐盘</strong>
          <span id="statusText">准备刷新</span>
        </div>
        <div class="window-actions">
          <button id="refreshBtn" title="立即刷新">↻</button>
          <button id="themeBtn" title="切换颜色">色</button>
          <button id="privacyBtn" title="隐藏持仓/盈亏">隐</button>
          <button id="minimalBtn" title="极简模式">简</button>
          <button id="hideBtn" title="隐藏窗口">_</button>
          <button id="closeBtn" title="退出">×</button>
        </div>
      </header>

      <section class="toolbar">
        <input id="symbolInput" placeholder="输入 600519 / sh600519 添加自选">
        <input id="costInput" class="number" placeholder="成本">
        <input id="quantityInput" class="number" placeholder="持仓">
        <button id="addBtn">添加</button>
        <span id="opacityText" class="hint"></span>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>名称</th>
              <th>代码</th>
              <th>现价</th>
              <th>涨跌</th>
              <th>涨幅</th>
              <th class="optional">成本</th>
              <th class="optional">持仓</th>
              <th class="optional pnl-col">盈亏</th>
              <th>时间</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="quoteRows"></tbody>
        </table>
      </section>

      <footer class="footer">
        <span>默认每 60 秒刷新，隐藏窗口时暂停显示更新。</span>
        <span>快捷键：Ctrl+~ 隐藏 / Ctrl+Alt+C 颜色 / Ctrl+Alt+H 隐私 / Ctrl+Alt+M 极简</span>
      </footer>
    </main>
    <script src="./app.js"></script>
  </body>
</html>

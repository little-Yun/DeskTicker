<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐盘</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="app" class="app">
      <header class="titlebar">
        <div class="brand">
          <span class="dot"></span>
          <strong>隐盘</strong>
          <span id="statusText">准备刷新</span>
        </div>
        <div class="window-actions">
          <button id="refreshBtn" title="立即刷新">↻</button>
          <button id="themeBtn" title="切换颜色">色</button>
          <button id="minimalBtn" title="极简模式">简</button>
          <button id="hideBtn" class="icon-btn" title="隐藏窗口">−</button>
          <button id="closeBtn" title="退出">×</button>
        </div>
      </header>

      <section class="toolbar">
        <div class="symbol-box">
          <input id="symbolInput" autocomplete="off" placeholder="输入 600519 / sh600519 / 股票名称">
          <div id="suggestionList" class="suggestion-list" hidden></div>
        </div>
        <button id="addBtn">添加</button>
        <div class="refresh-select">
          <button id="refreshIntervalButton" class="refresh-select-button" type="button" title="数据更新时间" aria-haspopup="listbox" aria-expanded="false">
            <span id="refreshIntervalLabel">1分钟</span>
            <span class="refresh-select-arrow" aria-hidden="true"></span>
          </button>
          <div id="refreshIntervalMenu" class="refresh-select-menu" role="listbox" hidden>
            <button type="button" role="option" data-value="5000">5秒</button>
            <button type="button" role="option" data-value="10000">10秒</button>
            <button type="button" role="option" data-value="15000">15秒</button>
            <button type="button" role="option" data-value="60000">1分钟</button>
          </div>
        </div>
        <span id="opacityText" class="hint"></span>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>名称</th>
              <th>代码</th>
              <th>现价</th>
              <th>涨跌</th>
              <th>涨幅</th>
              <th>评分</th>
              <th>AI分析</th>
              <th>时间</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="quoteRows"></tbody>
        </table>
      </section>

      <footer class="footer">
        <span id="refreshHint">默认每 60 秒刷新，隐藏窗口时暂停显示更新。</span>
        <span>快捷键：Ctrl+~ 隐藏 / Ctrl+Alt+C 颜色 / Ctrl+Alt+M 极简</span>
      </footer>
    </main>

    <div id="analysisModal" class="modal-backdrop" hidden>
      <section class="analysis-modal" role="dialog" aria-modal="true" aria-labelledby="analysisTitle">
        <header class="modal-header">
          <div>
            <strong id="analysisTitle">股票分析</strong>
            <span id="analysisSubtitle"></span>
          </div>
          <button id="analysisCloseBtn" title="关闭">×</button>
        </header>
        <div id="analysisContent" class="analysis-content"></div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
